name: Mise à jour prévisions pêche

on:
  schedule:
    - cron: '0 6 * * *'   # 6h UTC = 8h Paris (heure d'été)
  workflow_dispatch:        # Déclenchement manuel depuis l'interface GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Génération des prévisions
        env:
          PYTHONIOENCODING: utf-8
        run: python pechebar.py

      - name: Commit et push du fichier généré
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Previsions du $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
